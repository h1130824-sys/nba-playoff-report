    <style>

        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #1d428a; } /* NBA Blue */

        input { padding: 10px; width: 60%; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #c8102e; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #resultArea { margin-top: 20px; font-weight: bold; color: #333; min-height: 50px; }
        
        /* 圖表區塊 (設定大小) */
        .chart-container { position: relative; height: 300px; width: 300px; margin: auto; }
        
        /* 對戰區塊 (Flexbox 排版) */
        .vs-card { border: 2px solid #1d428a; margin: 15px 0; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .win-rate { font-size: 28px; color: #c8102e; font-weight: bold; }
        .wins-text { font-size: 14px; color: #666; }
    </style>
</head>
